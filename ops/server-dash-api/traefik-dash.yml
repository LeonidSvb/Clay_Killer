http:
  routers:
    server-dash-https:
      entrypoints: [https]
      rule: Host(`dash.pamelacoreypc.com`)
      service: server-dash
      tls:
        certResolver: letsencrypt

    server-dash-http:
      entrypoints: [http]
      rule: Host(`dash.pamelacoreypc.com`)
      middlewares: [redirect-to-https]
      service: server-dash

  services:
    server-dash:
      loadBalancer:
        servers:
          - url: "http://server-dash-api:8080"

  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
